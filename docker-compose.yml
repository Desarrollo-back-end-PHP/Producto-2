version: '3.8'
services:
  app:
    build: .
    container_name: p2_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: mysql:8.0
    container_name: p2_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reparaya
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    ports:
      - "3307:3306"
    volumes:
      - p2_db_data:/var/lib/mysql
      - ./sql/reparaya.sql:/docker-entrypoint-initdb.d/reparaya.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: p2_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  p2_db_data:
